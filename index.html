<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web có thú cưng Oneko</title>
    <style>
        /* CSS trang trí cho web một chút để dễ nhìn */
        body {
            background-color: #1e1e2e; /* Màu nền tối giống trong video */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h2>Xin chào! 👋</h2>
        <p>Hãy thử di chuyển con trỏ chuột ra xung quanh màn hình nhé.</p>
        <p>Chú mèo sẽ chạy theo chuột của bạn!</p>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/adryd325/oneko.js/oneko.js"></script>

</body>
</html>
