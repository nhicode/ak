<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chisato • Profile</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#120a24;
    --night-2:#1b1036;
    --glass:rgba(255,255,255,.06);
    --glass-border:rgba(255,255,255,.14);
    --frost:#9fe8ff;
    --pink:#ff6fa8;
    --gold:#ffd76b;
    --mint:#6be8c9;
    --text:#f5f1ff;
    --muted:#b8adda;
    /* Canh vị trí khuôn mặt/đầu trong khung tròn avatar. "center 20%" nghĩa là
       neo 20% từ trên xuống — tăng % nếu đầu vẫn bị cắt, giảm nếu bị lệch xuống dưới. */
    --avatar-pos: center 20%;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    font-family:'Nunito', sans-serif;
    color:var(--text);
    background:#000;
    overflow-x:hidden;
  }

  /* ============================================================
     BOOT / TERMINAL SCREEN
  ============================================================ */
  #boot{
    position:fixed; inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    transition:opacity .6s ease;
    cursor:pointer;
  }
  #boot.hide{ opacity:0; pointer-events:none; }
  .term-window{
    width:min(92vw, 560px);
    background:#17151f;
    border-radius:12px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.8);
    overflow:hidden;
    border:1px solid rgba(255,255,255,.06);
  }
  .term-bar{
    display:flex;
    gap:7px;
    padding:10px 12px;
    background:#1f1c29;
  }
  .term-dot{ width:11px; height:11px; border-radius:50%; }
  .term-dot.r{ background:#ff5f57; }
  .term-dot.y{ background:#febc2e; }
  .term-dot.g{ background:#28c840; }
  .term-body{
    padding:26px 20px 30px;
    text-align:center;
  }
  #asciiArt{
    font-family:'JetBrains Mono', monospace;
    font-size:8.5px;
    line-height:8.5px;
    letter-spacing:0;
    white-space:pre;
    color:#e9e6f5;
    display:inline-block;
    margin:0 auto;
  }
  .boot-lines{
    margin-top:16px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    min-height:96px;
  }
  .boot-line{
    opacity:0;
    transform:translateY(4px);
    transition:opacity .35s ease, transform .35s ease;
    margin:3px 0;
  }
  .boot-line.show{ opacity:1; transform:translateY(0); }
  .boot-line.prompt{
    color:var(--gold);
    font-weight:700;
    margin-top:10px;
    animation:blinkPrompt 1.1s step-end infinite;
  }
  @keyframes blinkPrompt{ 50%{ opacity:.35; } }

  /* ============================================================
     PROFILE PAGE
  ============================================================ */
  #profile{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
    position:relative;
    perspective:1200px;
  }
  .bg-video{
    position:fixed; inset:0; z-index:-2;
    width:100%; height:100%;
    object-fit:cover;
  }
  .bg-layer{
    position:fixed; inset:0; z-index:-1;
    background:
      radial-gradient(circle at 20% 25%, rgba(255,111,168,.28), transparent 45%),
      radial-gradient(circle at 80% 20%, rgba(159,232,255,.22), transparent 45%),
      radial-gradient(circle at 50% 85%, rgba(167,139,250,.26), transparent 50%),
      linear-gradient(160deg, rgba(18,10,36,.55), rgba(27,16,54,.6));
    background-size:200% 200%;
    animation:drift 18s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{ background-position:0% 0%; }
    50%{ background-position:100% 100%; }
  }

  .card{
    width:min(92vw, 420px);
    background:rgba(255,255,255,.02);
    border:1px solid rgba(255,255,255,.22);
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
    border-radius:26px;
    padding:34px 26px 26px;
    text-align:center;
    box-shadow:
      0 30px 70px -24px rgba(0,0,0,.65),
      0 0 16px rgba(255,255,255,.55),
      0 0 34px rgba(255,255,255,.30),
      0 0 30px rgba(159,232,255,.30),
      0 0 56px rgba(255,111,168,.18),
      inset 0 0 0 1px rgba(255,255,255,.16);
    opacity:0;
    position:relative;
    transform-style:preserve-3d;
    will-change:transform;
    transform:translateY(18px) scale(.98);
    transition:opacity .7s ease, transform .7s ease, box-shadow 2.4s ease-in-out;
    animation:cardGlow 4.8s ease-in-out infinite;
  }
  @keyframes cardGlow{
    0%,100%{
      box-shadow:
        0 30px 70px -24px rgba(0,0,0,.65),
        0 0 14px rgba(255,255,255,.45),
        0 0 28px rgba(255,255,255,.22),
        0 0 26px rgba(159,232,255,.22),
        0 0 48px rgba(255,111,168,.14),
        inset 0 0 0 1px rgba(255,255,255,.12);
    }
    50%{
      box-shadow:
        0 30px 70px -24px rgba(0,0,0,.65),
        0 0 22px rgba(255,255,255,.75),
        0 0 46px rgba(255,255,255,.40),
        0 0 38px rgba(159,232,255,.36),
        0 0 66px rgba(255,111,168,.24),
        inset 0 0 0 1px rgba(255,255,255,.22);
    }
  }
  .card.in{ opacity:1; transform:translateY(0) scale(1); }
  /* Trong lúc đang nghiêng theo con trỏ, transform phải đổi NHANH (linear),
     nếu không nó sẽ bị kẹt vào transition .7s ở trên và trông như "đứng hình" / lệch. */
  .card.tilting{ transition:opacity .7s ease, transform .05s linear, box-shadow 2.4s ease-in-out; }

  .deco-ring{
    position:absolute;
    width:52px; height:52px;
    border-radius:50%;
    right:16px; bottom:16px;
    background:radial-gradient(circle at 32% 30%, rgba(255,255,255,.35), rgba(184,173,218,.12) 55%, transparent 72%);
    border:9px solid rgba(184,173,218,.30);
    pointer-events:none;
  }

  .deco-star{
    position:absolute;
    top:60%;
    right:-4px;
    font-size:22px;
    color:#fff;
    text-shadow:0 0 10px rgba(255,255,255,.6);
    animation:twinkle 2.4s ease-in-out infinite;
    pointer-events:none;
  }
  .deco-cat{
    position:absolute;
    font-size:18px;
    pointer-events:none;
    will-change:left, top;
  }
  .deco-cat .cat-body{
    display:inline-block;
    filter:grayscale(1) brightness(0) invert(1) drop-shadow(0 0 4px rgba(255,255,255,.5));
    animation:catBounce .5s ease-in-out infinite;
    transform:scaleX(var(--flip, 1));
  }
  @keyframes catBounce{
    0%,100%{ transform:translateY(0) scaleX(var(--flip, 1)); }
    50%{ transform:translateY(-3px) scaleX(var(--flip, 1)); }
  }
  .paw-trail{
    position:absolute;
    font-size:9px;
    opacity:.55;
    pointer-events:none;
    filter:grayscale(1) brightness(0) invert(1);
    animation:pawFade .7s ease-out forwards;
  }
  @keyframes pawFade{
    0%{ opacity:.55; transform:scale(1); }
    100%{ opacity:0; transform:scale(.6); }
  }

  .avatar-wrap{
    position:relative;
    width:112px; height:112px;
    margin:0 auto 16px;
    opacity:0;
    transform:scale(.35) rotate(-18deg);
    transition:opacity .65s cubic-bezier(.34,1.56,.64,1), transform .75s cubic-bezier(.34,1.56,.64,1);
    transition-delay:.12s;
  }
  .card.in .avatar-wrap{
    opacity:1;
    transform:scale(1) rotate(0deg);
    animation:avatarPulse 2.6s ease-in-out .9s infinite;
  }
  @keyframes avatarPulse{
    0%,100%{ filter:drop-shadow(0 0 0 rgba(255,255,255,0)); }
    50%{ filter:drop-shadow(0 0 10px rgba(255,255,255,.45)); }
  }
  .avatar-ring{
    position:absolute; inset:-6px;
    border-radius:50%;
    background:conic-gradient(from 0deg, #ffffff, var(--frost), #ffffff, var(--mint), #ffffff);
    animation:spin 6s linear infinite;
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .avatar{
    position:absolute; inset:0;
    border-radius:50%;
    background:#241a3d;
    display:flex; align-items:center; justify-content:center;
    font-size:52px;
    overflow:hidden;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; object-position:var(--avatar-pos, center 20%); }
  .sparkle{
    position:absolute;
    font-size:12px;
    color:var(--frost);
    animation:twinkle 2.4s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0; transform:scale(.4) rotate(0deg); }
    50%{ opacity:1; transform:scale(1) rotate(25deg); }
  }

  .title-line{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:21px;
    min-height:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:2px;
    flex-wrap:wrap;
  }
  .title-cursor{
    display:inline-block;
    width:2px; height:20px;
    background:var(--frost);
    margin-left:2px;
    animation:blinkCursor .9s step-end infinite;
  }
  @keyframes blinkCursor{ 50%{ opacity:0; } }

  .badge-row{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px 0 20px;
  }
  .badge{
    width:30px; height:30px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
  }

  .discord-box{
    background:rgba(0,0,0,.28);
    border-radius:16px;
    padding:14px 16px;
    text-align:left;
    margin-bottom:18px;
  }
  .discord-user{
    display:flex; align-items:center; gap:10px;
    margin-bottom:10px;
  }
  .discord-avatar{
    width:34px; height:34px; border-radius:50%;
    background:linear-gradient(135deg, var(--pink), var(--frost));
    display:flex;align-items:center;justify-content:center;
    font-size:15px;
    flex-shrink:0;
    overflow:hidden;
  }
  .discord-avatar img{ width:100%; height:100%; object-fit:cover; object-position:var(--avatar-pos, center 20%); }
  .discord-name{ font-weight:800; font-size:14.5px; }
  .discord-bio{
    text-align:center;
    font-size:12.5px;
    font-style:italic;
    color:var(--muted);
    line-height:1.6;
  }

  .info-box{
    background:rgba(0,0,0,.22);
    border-radius:16px;
    padding:14px 10px;
    margin-bottom:20px;
    font-size:13.5px;
    font-weight:700;
    line-height:1.75;
    color:var(--text);
  }
  .info-box .muted-line{ color:var(--muted); font-weight:600; }

  .tech-row, .social-row{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
  }
  .tech-row{ margin-bottom:18px; }
  .tech-icon{
    width:32px; height:32px;
    border-radius:9px;
    background:rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center;
    padding:5px;
  }
  .tech-icon img{ width:100%; height:100%; object-fit:contain; }

  .social-icon{
    width:38px; height:38px;
    border-radius:50%;
    background:rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center;
    padding:8px;
    text-decoration:none;
    transition:transform .15s ease;
  }
  .social-icon:active{ transform:scale(.9); }
  .social-icon img{ width:100%; height:100%; object-fit:contain; }

  .cursor-star{
    position:fixed;
    pointer-events:none;
    font-size:12px;
    color:var(--frost);
    z-index:40;
    animation:starFade .6s ease forwards;
  }
  @keyframes starFade{
    0%{ opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(.2) rotate(45deg) translateY(-14px); }
  }
</style>
</head>

<script>
/* ============================================================

============================================================ */

  avatarEmoji: "🐸",          // dùng để vẽ ASCII lúc boot + làm avatar mặc định

/* ============================================================
   BOOT: ASCII từ emoji + hiệu ứng "giải mã"
============================================================ */
function buildAsciiFromEmoji(emoji, cols, rows){
  const cw = 12, ch = 24;
  const canvas = document.createElement('canvas');
  canvas.width = cols*cw; canvas.height = rows*ch;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `${canvas.height*0.82}px serif`;
  ctx.fillText(emoji, canvas.width/2, canvas.height/2 + canvas.height*0.03);
  const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const ramp = " .:-=+*#%@";
  const lines = [];
  for(let r=0;r<rows;r++){
    let line = '';
    for(let c=0;c<cols;c++){
      let total=0, count=0;
      for(let yy=0; yy<ch; yy+=3){
        for(let xx=0; xx<cw; xx+=3){
          const x = c*cw+xx, y = r*ch+yy;
          const idx = (y*canvas.width + x)*4;
          total += (data[idx]+data[idx+1]+data[idx+2])/3;
          count++;
        }
      }
      const avg = total/count;
      const charIdx = Math.min(ramp.length-1, Math.floor((avg/255)*ramp.length));
      line += ramp[charIdx];
    }
    lines.push(line);
  }
  return lines;
}

function buildAsciiFromImage(imgUrl, cols, rows){
  return new Promise((resolve, reject)=>{
    const cw = 8, ch = 16;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      canvas.width = cols*cw; canvas.height = rows*ch;
      const ctx = canvas.getContext('2d');
      // crop ảnh thành hình vuông ở giữa rồi vẽ full khung để nét hơn
      const side = Math.min(img.naturalWidth, img.naturalHeight);
      const sx = (img.naturalWidth - side)/2, sy = (img.naturalHeight - side)/2;
      ctx.drawImage(img, sx, sy, side, side, 0, 0, canvas.width, canvas.height);
      const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
      const ramp = " .:-=+*#%@";
      const lines = [];
      for(let r=0;r<rows;r++){
        let line = '';
        for(let c=0;c<cols;c++){
          let total=0, count=0;
          for(let yy=0; yy<ch; yy+=2){
            for(let xx=0; xx<cw; xx+=2){
              const x = c*cw+xx, y = r*ch+yy;
              const idx = (y*canvas.width + x)*4;
              total += (data[idx]+data[idx+1]+data[idx+2])/3;
              count++;
            }
          }
          const avg = total/count;
          const charIdx = Math.min(ramp.length-1, Math.floor((avg/255)*ramp.length));
          line += ramp[charIdx];
        }
        lines.push(line);
      }
      resolve(lines);
    };
    img.onerror = reject;
    img.src = imgUrl;
  });
}

function animateAsciiReveal(targetLines, el, duration){
  return new Promise(resolve=>{
    const rows = targetLines.length;
    const cols = targetLines[0].length;
    const finishTimes = targetLines.map(()=>
      Array.from({length:cols}, ()=> Math.random()*duration*0.75)
    );
    const glitch = "!<>-_\\/[]{}=+*^?#";
    const start = performance.now();
    function frame(now){
      const t = now - start;
      let out = '';
      for(let r=0;r<rows;r++){
        let line = '';
        for(let c=0;c<cols;c++){
          const target = targetLines[r][c];
          if(target === ' '){ line += ' '; continue; }
          line += (t >= finishTimes[r][c]) ? target : glitch[(Math.random()*glitch.length)|0];
        }
        out += line + '\n';
      }
      el.textContent = out;
      if(t < duration){
        requestAnimationFrame(frame);
      } else {
        el.textContent = targetLines.join('\n');
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

function animateAsciiTypewriter(targetLines, el, totalDuration){
  return new Promise(resolve=>{
    const rows = targetLines.length;
    const cols = targetLines[0].length;
    const totalChars = rows*cols;
    const start = performance.now();
    function frame(now){
      const elapsed = now - start;
      // Bao nhiêu ký tự đáng lẽ đã hiện ra tính theo thời gian trôi qua,
      // thay vì đặt 1 setTimeout cho từng ký tự (rất nặng máy, gây giật lag cho toàn trang).
      const shown = Math.min(totalChars, Math.ceil((elapsed/totalDuration) * totalChars));
      let out = '';
      let count = 0;
      for(let r=0;r<rows;r++){
        let line = '';
        for(let c=0;c<cols;c++){
          line += (count < shown) ? targetLines[r][c] : ' ';
          count++;
        }
        out += line + '\n';
      }
      el.textContent = out;
      if(shown < totalChars){
        requestAnimationFrame(frame);
      } else {
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

function addBootLine(container, text, cls){
  return new Promise(resolve=>{
    const div = document.createElement('div');
    div.className = 'boot-line' + (cls ? ' '+cls : '');
    div.textContent = text;
    container.appendChild(div);
    requestAnimationFrame(()=> div.classList.add('show'));
    setTimeout(resolve, 260);
  });
}

function detectSystem(){
  const ua = navigator.userAgent;
  if(/Windows/.test(ua)) return "Windows";
  if(/Mac OS X/.test(ua)) return /iPhone|iPad|iPod/.test(ua) ? "iOS" : "macOS";
  if(/Android/.test(ua)) return "Android";
  if(/Linux/.test(ua)) return "Linux";
  return "Unknown";
}

async function runBoot(){
  const asciiEl = document.getElementById('asciiArt');
  const linesEl = document.getElementById('bootLines');

  let ascii;
  try{
    ascii = await buildAsciiFromImage(CONFIG.avatarImageUrl || CONFIG.discordAvatarUrl, 64, 32);
  }catch(e){
    ascii = buildAsciiFromEmoji(CONFIG.avatarEmoji, 42, 20);
  }

  await animateAsciiTypewriter(ascii, asciiEl, 500);

  await addBootLine(linesEl, "Press Enter / Click To Continue", "prompt");

  const proceed = ()=>{
    document.getElementById('boot').classList.add('hide');
    document.removeEventListener('keydown', onKey);
    document.getElementById('boot').removeEventListener('click', proceed);
    const bgVideo = document.querySelector('.bg-video');
    if(bgVideo){
      bgVideo.muted = false;
      bgVideo.volume = 0.5;
      bgVideo.play().catch(()=>{ /* nếu trình duyệt vẫn chặn, giữ im lặng */ });
    }
    setTimeout(showProfile, 500);
  };
  const onKey = (e)=>{ if(e.key === 'Enter') proceed(); };
  document.addEventListener('keydown', onKey);
  document.getElementById('boot').addEventListener('click', proceed);
}

function renderTypedTitle(){
  const el = document.getElementById('typedTitle');
  const titles = CONFIG.titles;
  let ti = 0;

  function typeOut(text){
    return new Promise(resolve=>{
      let i = 0;
      const iv = setInterval(()=>{
        el.textContent = text.slice(0, i+1);
        i++;
        if(i >= text.length){ clearInterval(iv); resolve(); }
      }, 55);
    });
  }
  function eraseOut(text){
    return new Promise(resolve=>{
      let i = text.length;
      const iv = setInterval(()=>{
        el.textContent = text.slice(0, i-1);
        i--;
        if(i <= 0){ clearInterval(iv); resolve(); }
      }, 30);
    });
  }
  async function loop(){
    while(true){
      const text = titles[ti % titles.length];
      await typeOut(text);
      await new Promise(r=> setTimeout(r, 1400));
      await eraseOut(text);
      await new Promise(r=> setTimeout(r, 300));
      ti++;
    }
  }
  loop();
}

function renderIconRow(containerId, items, size){
  const container = document.getElementById(containerId);
  items.forEach(item=>{
    const slug = typeof item === 'string' ? item : item.icon;
    const url = typeof item === 'string' ? null : item.url;
    const box = url ? document.createElement('a') : document.createElement('div');
    box.className = containerId === 'techRow' ? 'tech-icon' : 'social-icon';
    if(url){ box.href = url; box.target = '_blank'; box.rel = 'noopener'; }
    const img = document.createElement('img');
    img.src = `https://cdn.simpleicons.org/${slug}`;
    img.alt = slug;
    let triedFallback = false;
    img.onerror = function(){
      // Thử nguồn CDN dự phòng (jsDelivr) trước khi bỏ cuộc — nhiều trường hợp
      // "icon bị thiếu" chỉ là do cdn.simpleicons.org bị chặn/lag chứ không phải sai tên icon.
      if(!triedFallback){
        triedFallback = true;
        img.src = `https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/${slug}.svg`;
        return;
      }
      box.innerHTML = '';
      box.textContent = slug.slice(0,2).toUpperCase();
      box.style.fontSize = '10px';
      box.style.fontWeight = '800';
      box.style.color = '#241a3d';
    };
    box.appendChild(img);
    container.appendChild(box);
  });
}

function animateCatAroundBox(catEl, boxEl, speed){
  speed = speed || 70; // px/s
  const bodyEl = catEl.querySelector('.cat-body');
  const cardEl = catEl.closest('.card');
  let flip = 1;
  let lastPawTime = 0;
  let dist = 0;        // quãng đường đã đi dọc theo chu vi (px)
  let lastNow = null;

  function frame(now){
    if(lastNow === null) lastNow = now;
    // Giới hạn dt tối đa 50ms/khung hình: nếu tab bị đứng khựng (do boot nặng máy...)
    // mèo sẽ tiếp tục đi mượt từ chỗ cũ thay vì "nhảy cóc" tới vị trí lẽ ra đã tới.
    const dt = Math.min(50, now - lastNow) / 1000;
    lastNow = now;
    dist += dt * speed;

    const x = boxEl.offsetLeft, y = boxEl.offsetTop;
    const w = boxEl.offsetWidth, h = boxEl.offsetHeight;
    const perimeter = 2*(w+h) || 1;
    const t = dist % perimeter;
    let px, py;
    if(t < w){ px = x+t; py = y; flip = 1; }
    else if(t < w+h){ px = x+w; py = y+(t-w); flip = 1; }
    else if(t < w+h+w){ px = x+w-(t-w-h); py = y+h; flip = -1; }
    else { px = x; py = y+h-(t-w-h-w); flip = -1; }
    catEl.style.left = px+'px';
    catEl.style.top = py+'px';
    catEl.style.transform = 'translate(-50%,-50%)';
    if(bodyEl) bodyEl.style.setProperty('--flip', flip);

    if(cardEl && now - lastPawTime > 220){
      lastPawTime = now;
      const paw = document.createElement('div');
      paw.className = 'paw-trail';
      paw.textContent = '🐾';
      paw.style.left = px+'px';
      paw.style.top = py+'px';
      paw.style.transform = `translate(-50%,-50%) scaleX(${flip})`;
      cardEl.appendChild(paw);
      setTimeout(()=> paw.remove(), 700);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ============================================================
   TƯƠNG TÁC 3D: thẻ nghiêng nhẹ theo vị trí con trỏ / chạm
============================================================ */
(function initTilt(){
  const profileEl = document.getElementById('profile');
  const cardEl = document.getElementById('card');
  const maxTilt = 12; // độ
  const ease = 0.10; // độ mượt: nhỏ hơn = mượt/chậm hơn

  let targetRotX = 0, targetRotY = 0, targetScale = 1;
  let curRotX = 0, curRotY = 0, curScale = 1;
  let looping = false;

  function loop(){
    curRotX += (targetRotX - curRotX) * ease;
    curRotY += (targetRotY - curRotY) * ease;
    curScale += (targetScale - curScale) * ease;
    cardEl.style.transform = `translateY(0) scale(${curScale}) rotateX(${curRotX.toFixed(2)}deg) rotateY(${curRotY.toFixed(2)}deg)`;
    const settled = Math.abs(targetRotX-curRotX) < 0.05 && Math.abs(targetRotY-curRotY) < 0.05 &&
                     Math.abs(targetScale-curScale) < 0.002 && targetRotX===0 && targetRotY===0 && targetScale===1;
    if(settled){
      looping = false;
      cardEl.style.transform = 'translateY(0) scale(1) rotateX(0deg) rotateY(0deg)';
      cardEl.classList.remove('tilting'); // về lại transition mượt .7s khi đã đứng yên
      return;
    }
    requestAnimationFrame(loop);
  }
  function ensureLoop(){
    cardEl.classList.add('tilting'); // bắt buộc phải bật class này, nếu không transform sẽ bị transition .7s "nuốt" mất và card trông như bị kẹt/nghiêng cứng
    if(!looping){ looping = true; requestAnimationFrame(loop); }
  }

  function setTarget(clientX, clientY){
    const rect = cardEl.getBoundingClientRect();
    const dx = (clientX - (rect.left + rect.width/2)) / (rect.width/2);
    const dy = (clientY - (rect.top + rect.height/2)) / (rect.height/2);
    targetRotY = Math.max(-1, Math.min(1, dx)) * maxTilt;
    targetRotX = Math.max(-1, Math.min(1, dy)) * -maxTilt;
    targetScale = 1.025;
    ensureLoop();
  }
  function resetTarget(){
    targetRotX = 0; targetRotY = 0; targetScale = 1;
    ensureLoop();
  }

  profileEl.addEventListener('pointermove', (e)=>{
    if(!cardEl.classList.contains('in')) return;
    setTarget(e.clientX, e.clientY);
  });
  profileEl.addEventListener('pointerleave', resetTarget);
  profileEl.addEventListener('touchmove', (e)=>{
    if(!cardEl.classList.contains('in')) return;
    const touch = e.touches[0];
    if(touch) setTarget(touch.clientX, touch.clientY);
  }, { passive:true });
  profileEl.addEventListener('touchend', resetTarget);
})();
